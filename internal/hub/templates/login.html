{{define "title"}}Login{{end}}
{{define "content"}}
<article style="max-width: 400px; margin: 10vh auto 0;">
    <header><h2>SSH Vault</h2></header>
    {{if .Error}}
    <p style="color: var(--pico-del-color);">Invalid password. Please try again.</p>
    {{end}}
    <form method="post" action="/login">
        <label for="password">Dashboard Password</label>
        <input type="password" id="password" name="password" required autofocus>
        <button type="submit">Log In</button>
    </form>
</article>
{{end}}
{{template "layout" .}}
